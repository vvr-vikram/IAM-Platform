server:
  port: 8080

spring:
  application:
    name: iam-platform
  profiles:
    active: dev

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/iam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:1254}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false
    clean-on-validation-error: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# JWT Configuration
app:
  jwt:
    # 256-bit secret key in Base64
    secret: d29uZGVyZnVsLXNlY3JldC1rZXktZm9yLWVudGVycHJpc2UtaWFtLXBsYXRmb3JtLXdpdGgtamF2YS0yMS1hbmQtc3ByaW5nLWJvb3QtMy54Cg==
    access-expiration-ms: 900000 # 15 minutes
    refresh-expiration-ms: 604800000 # 7 days
  mfa:
    app-name: EnterpriseIAM

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:iam_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      repositories:
        enabled: false
